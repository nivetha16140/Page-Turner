<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folioverse — Books by Nivetha S</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d;--surface:#161616;--card:#1c1c1c;--border:#2a2a2a;--border2:#333;
  --text:#f0ece4;--muted:#888;--muted2:#555;
  --amber:#e8a430;--amber2:#f5c460;--green:#3d9970;--red:#c0392b;--blue:#2e86de;
  --radius:14px;--radius-sm:8px;--shadow:0 4px 32px rgba(0,0,0,.55);--shadow2:0 2px 12px rgba(0,0,0,.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}
#toastZone{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border2);color:var(--text);padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;max-width:280px;line-height:1.4;box-shadow:var(--shadow2);pointer-events:all;animation:toastIn .3s ease,toastOut .4s 2.6s forwards}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(60px)}}
#navbar{position:sticky;top:0;z-index:800;background:rgba(13,13,13,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 24px;height:62px}
.brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--amber);letter-spacing:.5px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px;flex-shrink:0}
.brand em{font-style:italic;color:var(--amber2)}
.search-wrap{flex:1;max-width:460px;margin:0 12px;position:relative;display:flex;align-items:center}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:9px 40px 9px 40px;color:var(--text);font-size:13.5px;outline:none;transition:border .2s,box-shadow .2s}
.search-wrap input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,164,48,.12)}
.search-wrap input::placeholder{color:var(--muted2)}
.search-icon{position:absolute;left:14px;color:var(--muted);pointer-events:none;flex-shrink:0}
.search-clear{position:absolute;right:14px;background:none;border:none;color:var(--muted);font-size:16px;display:none;padding:0;line-height:1;transition:color .15s}
.search-clear.show{display:block}.search-clear:hover{color:var(--red)}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0}
.nav-btn{background:none;border:none;color:var(--muted);padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:all .18s;white-space:nowrap}
.nav-btn:hover{background:var(--surface);color:var(--text)}.nav-btn.active{background:rgba(232,164,48,.12);color:var(--amber)}
.cart-count{background:var(--amber);color:#000;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.page{display:none;animation:pageIn .25s ease}.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hero{background:linear-gradient(135deg,#0d0d0d 0%,#1a1205 50%,#0d0d0d 100%);padding:80px 32px 60px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 60%,rgba(232,164,48,.07) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(232,164,48,.1);border:1px solid rgba(232,164,48,.25);color:var(--amber2);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:40px;margin-bottom:24px}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,6vw,72px);font-weight:700;color:var(--text);line-height:1.08;margin-bottom:18px}
.hero h1 em{color:var(--amber);font-style:italic}
.hero p{color:var(--muted);font-size:16px;max-width:480px;margin:0 auto 36px;line-height:1.7}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{border:none;border-radius:40px;padding:13px 28px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all .2s;letter-spacing:.2px}
.btn-amber{background:var(--amber);color:#000}.btn-amber:hover{background:var(--amber2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,164,48,.3)}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--text)}.btn-outline:hover{border-color:var(--amber);color:var(--amber)}
.btn-sm{padding:8px 18px;font-size:13px;border-radius:8px}
.btn-block{width:100%;justify-content:center;border-radius:var(--radius-sm)}
.btn-ghost{background:none;border:none;color:var(--muted);padding:6px 10px;font-size:14px;transition:color .15s;border-radius:6px}.btn-ghost:hover{color:var(--red)}
.cat-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:2px;padding:0 24px;overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-chip{background:none;border:none;color:var(--muted);padding:14px 16px;font-size:13px;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;transition:all .18s;flex-shrink:0}
.cat-chip:hover{color:var(--text)}.cat-chip.active{color:var(--amber);border-bottom-color:var(--amber)}
.section{padding:36px 28px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--text)}
.sec-count{font-size:13px;color:var(--muted);margin-left:10px;font-weight:400}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:20px}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .22s;position:relative}
.book-card:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.6)}
.cover{width:100%;aspect-ratio:3/4;position:relative;overflow:hidden}
.cover-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.book-card:hover .cover-img{transform:scale(1.06)}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.18) 55%,transparent 100%)}
.cover-spine{position:absolute;left:0;top:0;bottom:0;width:10px;background:rgba(0,0,0,.35);z-index:2}
.cover-title{position:absolute;bottom:14px;left:14px;right:14px;z-index:3;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:rgba(255,255,255,.95);line-height:1.25;text-shadow:0 1px 6px rgba(0,0,0,.9)}
.badge{position:absolute;top:10px;right:10px;z-index:4;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;border-radius:4px}
.badge-hot{background:#c0392b;color:#fff}.badge-new{background:#27ae60;color:#fff}.badge-sale{background:var(--amber);color:#000}
.oos-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);z-index:5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6)}
.book-body{padding:13px 13px 10px}
.book-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.book-author{font-size:11.5px;color:var(--muted);margin-bottom:6px}
.book-desc{font-size:11.5px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.book-price-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.price{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500;color:var(--text)}
.price-orig{font-size:11px;color:var(--muted);text-decoration:line-through;font-family:'JetBrains Mono',monospace}
.stars-row{display:flex;align-items:center;gap:3px;margin-bottom:5px}
.stars span{font-size:11px;color:var(--amber)}.stars span.dim{color:var(--muted2)}
.rating-ct{font-size:10.5px;color:var(--muted);margin-left:3px}
.members-txt{font-size:10.5px;color:var(--green);font-weight:500;margin-bottom:4px}
.delivery-txt{font-size:10.5px;color:var(--muted);margin-bottom:10px}.delivery-txt b{color:var(--amber2)}
.shared-txt{font-size:10px;color:var(--muted2);border-top:1px solid var(--border);padding:7px 13px;display:flex;align-items:center;gap:5px}
.add-btn{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px;font-size:12px;font-weight:600;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:hover{background:var(--amber);border-color:var(--amber);color:#000}.add-btn.in-cart{background:rgba(61,153,112,.15);border-color:var(--green);color:var(--green)}
.add-btn:disabled{opacity:.45;cursor:not-allowed}.add-btn:disabled:hover{background:var(--surface);border-color:var(--border);color:var(--text)}
.no-results{grid-column:1/-1;text-align:center;padding:64px 24px}
.no-results .nr-icon{font-size:52px;margin-bottom:16px}
.no-results h3{font-family:'Cormorant Garamond',serif;font-size:22px;margin-bottom:8px}
.no-results p{color:var(--muted);font-size:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);max-width:580px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(20px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
.modal-head h3{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:4px;border-radius:6px;transition:color .15s}.modal-close:hover{color:var(--red)}
.modal-body{padding:22px}
.modal-cover{width:100%;height:220px;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:20px;position:relative}
.modal-cover img{width:100%;height:100%;object-fit:cover;display:block}
.modal-cover-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.25),rgba(0,0,0,.5));display:flex;align-items:center;justify-content:center}
.modal-cover-overlay span{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#fff;text-align:center;padding:20px;text-shadow:0 2px 8px rgba(0,0,0,.9)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.detail-item label{display:block;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.detail-item span{font-size:13.5px;font-weight:500}.detail-item.full{grid-column:1/-1}
.info-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.rating-row{display:flex;gap:6px;margin:10px 0 8px}
.r-star-btn{background:none;border:none;font-size:24px;transition:transform .1s;padding:0}.r-star-btn:hover{transform:scale(1.2)}
.review-textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 13px;font-size:13px;outline:none;resize:vertical;min-height:80px;transition:border .2s;margin-bottom:10px}
.review-textarea:focus{border-color:var(--amber)}
.review-textarea::placeholder{color:var(--muted2)}
.reviews-list{margin-top:14px;display:flex;flex-direction:column;gap:10px}
.rev-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.rev-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;color:var(--muted)}
.rev-text{font-size:13px;line-height:1.55}
.cart-layout{display:grid;grid-template-columns:1fr 340px;gap:28px;padding:32px 28px;max-width:1100px;margin:0 auto}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-head{padding:16px 20px;border-bottom:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700}
.cart-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);transition:background .15s}
.cart-row:last-child{border-bottom:none}.cart-row:hover{background:rgba(255,255,255,.02)}
.cart-mini-cover{width:44px;height:58px;border-radius:6px;flex-shrink:0;overflow:hidden}
.cart-mini-cover img{width:100%;height:100%;object-fit:cover;display:block}
.cart-info{flex:1;min-width:0}.cart-info b{display:block;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cart-info span{font-size:11.5px;color:var(--muted)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:28px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{border-color:var(--amber);color:var(--amber)}
.qty-val{font-family:'JetBrains Mono',monospace;font-size:13px;min-width:22px;text-align:center}
.cart-price{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;min-width:68px;text-align:right}
.summary-panel{padding:20px}
.summary-panel h3{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;margin-bottom:18px}
.sum-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13.5px}
.sum-row.total{font-weight:700;font-size:16px;color:var(--amber);border-top:1px solid var(--border);padding-top:12px;margin-top:6px}
.form-group{margin-bottom:13px}
.form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.form-group input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 13px;font-size:13.5px;outline:none;transition:border .2s}
.form-group input:focus{border-color:var(--amber)}
.form-group input::placeholder{color:var(--muted2)}
.return-banner{display:flex;gap:8px;align-items:flex-start;background:rgba(61,153,112,.08);border:1px solid rgba(61,153,112,.25);border-radius:var(--radius-sm);padding:11px 13px;font-size:12px;color:var(--green);line-height:1.55;margin-top:12px}
.track-wrapper{max-width:680px;margin:48px auto;padding:0 24px}
.track-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px}
.track-card h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;margin-bottom:8px}
.track-card > p{color:var(--muted);font-size:14px;margin-bottom:24px}
.input-row{display:flex;gap:10px;margin-bottom:20px}
.big-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px 15px;font-size:14px;outline:none;transition:border .2s}
.big-input:focus{border-color:var(--amber)}.big-input::placeholder{color:var(--muted2)}
.order-block{margin-bottom:28px}.order-block:not(:first-child){padding-top:24px;border-top:1px solid var(--border)}
.order-header-info{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:20px}
.order-header-info h4{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;margin-bottom:8px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px}
.meta-item span{font-size:13px}
.stepper{display:flex;flex-direction:column}
.step{display:flex;gap:16px;padding-bottom:24px}.step:last-child{padding-bottom:0}
.step-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--border2);background:var(--surface);color:var(--muted);transition:all .35s;flex-shrink:0}
.step-dot.done{background:var(--green);border-color:var(--green);color:#fff}.step-dot.current{background:var(--amber);border-color:var(--amber);color:#000}
.step-line{width:2px;flex:1;background:var(--border);margin-top:4px;min-height:18px}.step-line.done{background:var(--green)}
.step-content{padding-top:7px}.step-label{font-weight:600;font-size:14px}.step-sub{font-size:12px;color:var(--muted);margin-top:2px}
.orders-wrapper{max-width:860px;margin:0 auto;padding:36px 24px}
.orders-wrapper h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;margin-bottom:8px}
.orders-wrapper > p{color:var(--muted);font-size:14px;margin-bottom:24px}
.email-lookup{display:flex;gap:10px;margin-bottom:28px;max-width:440px}
.ord-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;transition:border .2s}
.ord-card:hover{border-color:var(--border2)}
.ord-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px}
.ord-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
.ord-date{font-size:12px;color:var(--muted2)}
.status-pill{padding:4px 12px;border-radius:40px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.s-ordered{background:rgba(232,164,48,.15);color:var(--amber)}.s-packed{background:rgba(46,134,222,.12);color:var(--blue)}
.s-shipped{background:rgba(0,180,216,.1);color:#00b4d8}.s-delivered{background:rgba(61,153,112,.12);color:var(--green)}
.ord-items{font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.55}
.ord-bottom{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px}
.ord-total{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--amber)}
.about-wrapper{max-width:840px;margin:0 auto;padding:48px 28px}
.about-hero{display:grid;grid-template-columns:auto 1fr;gap:36px;align-items:start;margin-bottom:48px}
.avatar{width:148px;height:148px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--amber) 0%,#c0472b 100%);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:54px;font-weight:700;color:#fff;box-shadow:0 0 0 4px rgba(232,164,48,.2),var(--shadow)}
.author-name{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;line-height:1.1;margin-bottom:6px}
.author-role{color:var(--amber);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.author-bio{color:var(--muted);font-size:15px;line-height:1.75}
.about-sec{m
